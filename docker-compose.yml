networks:
  default:
    name: insighta_network

services:
  profile_frontend:
    build: .
    ports:
      - ${FRONTEND_PORT}:3000
    container_name: profile_frontend
    environment:
      - API_BASE_URL=${API_BASE_URL}
    networks:
      - default
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://0.0.0.0:3000"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always